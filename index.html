<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Chat Realtime (WhatsApp Style) - FIXED</title>
<style>
  :root {
    --primary-color: #6a0dad;
    --primary-light: #8a2be2;
    --primary-dark: #4b0082;
    --accent-color: #9370db;
    --white: #ffffff;
    --light-bg: #f0f0f0;
    --light-gray: #e6e6e6;
    --light-purple: #e6d4ff;
    --light-blue: #d1f4ff;
    --danger: #ff3b30;
    --text-dark: #333333;
    --text-light: #666666;
    --shadow: 0 2px 8px rgba(0,0,0,0.15);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.25);
  }
  
  * {
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--primary-color);
    margin: 0;
    padding: 0;
    color: var(--white);
    height: 100vh;
    overflow: hidden;
  }
  
  /* Login Screen */
  #login-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    background: var(--primary-color);
  }
  
  .login-container {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 30px;
    width: 100%;
    max-width: 400px;
    color: var(--text-dark);
    text-align: center;
  }
  
  .app-logo {
    font-size: 3rem;
    margin-bottom: 10px;
  }
  
  .app-title {
    color: var(--primary-color);
    margin-top: 0;
    margin-bottom: 20px;
  }
  
  .login-form input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 16px;
  }
  
  .password-container {
    position: relative;
  }
  
  .toggle-password {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-light);
  }
  
  .avatar-selection {
    margin: 15px 0;
    text-align: center;
  }
  
  .avatar-options {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  
  .avatar-option {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.3s;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--light-purple);
    font-size: 24px;
  }
  
  .avatar-option.selected {
    border-color: var(--primary-color);
    transform: scale(1.1);
  }
  
  .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary-color);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
    margin-top: 10px;
  }
  
  .login-btn:hover {
    background: var(--primary-dark);
  }
  
  /* Main App */
  #main-app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }
  
  header {
    background: var(--primary-color);
    color: var(--white);
    padding: 15px;
    text-align: center;
    font-size: 1.4em;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  
  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: var(--light-purple);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  
  .logout-btn {
    background: transparent;
    border: 1px solid var(--white);
    color: var(--white);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  .logout-btn:hover {
    background: rgba(255, 255, 255, 0.1);
  }
  
  /* Contacts Screen */
  #contacts-screen {
    flex: 1;
    background: var(--white);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  
  .contacts-header {
    background: var(--light-bg);
    padding: 15px;
    border-bottom: 1px solid #ddd;
    color: var(--text-dark);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  
  .refresh-btn {
    background: var(--primary-color);
    color: var(--white);
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  
  .delete-account-btn {
    background: var(--danger);
    color: var(--white);
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
    margin-left: 10px;
  }
  
  .contacts-list {
    flex: 1;
    overflow-y: auto;
  }
  
  .contact-item {
    display: flex;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  
  .contact-item:hover {
    background: var(--light-bg);
  }
  
  .contact-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: var(--light-purple);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-right: 15px;
  }
  
  .contact-info {
    flex: 1;
  }
  
  .contact-name {
    font-weight: bold;
    color: var(--text-dark);
    margin-bottom: 5px;
  }
  
  .contact-status {
    font-size: 0.8em;
    color: var(--text-light);
  }
  
  /* Chat Screen */
  #chat-screen {
    flex: 1;
    background: var(--white);
    display: none;
    flex-direction: column;
    height: 100%;
    /* PERBAIKAN: Pastikan chat screen mengambil seluruh ruang yang tersedia */
  }
  
  .chat-header {
    display: flex;
    align-items: center;
    padding: 15px;
    background: var(--primary-color);
    color: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  
  .back-btn {
    background: none;
    border: none;
    font-size: 1.2em;
    margin-right: 10px;
    cursor: pointer;
    color: var(--white);
  }
  
  .chat-contact-info {
    flex: 1;
  }
  
  .chat-contact-name {
    font-weight: bold;
    color: var(--white);
  }
  
  .chat-contact-status {
    font-size: 0.8em;
    color: rgba(255, 255, 255, 0.8);
  }
  
  .chat-actions {
    display: flex;
    gap: 10px;
  }
  
  .chat-action-btn {
    background: none;
    border: none;
    color: var(--white);
    font-size: 1.2em;
    cursor: pointer;
  }
  
  /* PERBAIKAN UTAMA: Struktur Chat Container yang Benar */
  #chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 100%;
    margin: 0 auto;
    background: var(--white);
    overflow: hidden;
    position: relative;
    height: 100%;
    /* PERBAIKAN: Tambahkan properti untuk memastikan layout yang benar */
    min-height: 0; /* Penting untuk flexbox scrolling */
  }
  
  /* PERBAIKAN UTAMA: Area pesan dengan scroll yang benar */
  #messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: #e5ddd5;
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23f0f0f0' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
    min-height: 0; /* Penting untuk flexbox scrolling */
    /* PERBAIKAN: Pastikan area pesan memiliki tinggi yang tepat */
    height: 0; /* Reset height untuk flexbox */
  }
  
  .msg {
    margin: 6px 0;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 75%;
    word-wrap: break-word;
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    color: var(--text-dark);
    animation: fadeIn 0.3s ease-in;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .me {
    background: var(--light-purple);
    align-self: flex-end;
    text-align: left;
    border-top-right-radius: 0;
  }
  
  .other {
    background: var(--white);
    align-self: flex-start;
    border-top-left-radius: 0;
  }
  
  .msg-sender {
    font-weight: bold;
    font-size: 0.85em;
    margin-bottom: 4px;
    color: var(--primary-color);
  }
  
  .msg-content {
    margin: 4px 0;
    line-height: 1.4;
    color: var(--text-dark);
  }
  
  .msg-time {
    font-size: 0.7em;
    color: var(--text-light);
    text-align: right;
    margin-top: 4px;
  }
  
  .other .msg-time {
    text-align: left;
  }
  
  /* Media message styles */
  .msg-media {
    max-width: 250px;
    border-radius: 8px;
    overflow: hidden;
    margin: 4px 0;
  }
  
  .msg-image {
    max-width: 100%;
    height: auto;
    display: block;
  }
  
  .msg-video {
    max-width: 100%;
    height: auto;
    display: block;
  }
  
  .msg-audio {
    width: 100%;
    height: 40px;
    background: var(--light-gray);
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    margin: 4px 0;
  }
  
  .audio-player {
    width: 100%;
    height: 30px;
  }
  
  .audio-duration {
    font-size: 0.8em;
    color: var(--text-light);
    margin-left: 10px;
  }
  
  /* PERBAIKAN UTAMA: Area input yang tetap di tempat */
  #input-area {
    display: flex;
    padding: 10px;
    background: var(--light-gray);
    border-top: 1px solid #ddd;
    align-items: center;
    position: sticky;
    bottom: 0;
    z-index: 100;
    flex-shrink: 0;
    /* PERBAIKAN: Pastikan area input selalu terlihat */
    width: 100%;
  }
  
  .input-buttons {
    display: flex;
    gap: 5px;
    margin-right: 10px;
  }
  
  .input-btn {
    background: none;
    border: none;
    font-size: 1.2em;
    cursor: pointer;
    color: var(--primary-color);
    padding: 8px;
    border-radius: 50%;
    transition: background 0.2s;
  }
  
  .input-btn:hover {
    background: rgba(0, 0, 0, 0.1);
  }
  
  #message {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 20px;
    padding: 10px 15px;
    outline: none;
    font-size: 16px;
  }
  
  #sendBtn {
    background: var(--primary-color);
    color: var(--white);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    margin-left: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  
  #sendBtn:hover {
    background: var(--primary-dark);
  }
  
  /* Bottom Navigation */
  .bottom-nav {
    display: flex;
    background: var(--white);
    border-top: 1px solid #ddd;
    position: sticky;
    bottom: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 12px;
    cursor: pointer;
    font-size: 1.2em;
    color: var(--text-light);
    transition: all 0.3s;
  }
  
  .nav-btn.active {
    color: var(--primary-color);
    background: var(--light-bg);
  }
  
  /* Notification */
  #notif {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--primary-color);
    color: var(--white);
    padding: 10px 16px;
    border-radius: 8px;
    box-shadow: var(--shadow);
    z-index: 2000;
    font-weight: bold;
  }
  
  /* New Message Notification */
  .message-notification {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: var(--primary-color);
    color: var(--white);
    padding: 12px 16px;
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    z-index: 2000;
    max-width: 300px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s, opacity 0.3s;
    transform: translateY(100px);
    opacity: 0;
  }
  
  .message-notification.show {
    transform: translateY(0);
    opacity: 1;
  }
  
  .notification-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: var(--light-purple);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  
  .notification-content {
    flex: 1;
    overflow: hidden;
  }
  
  .notification-sender {
    font-weight: bold;
    margin-bottom: 4px;
    font-size: 14px;
  }
  
  .notification-message {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .notification-close {
    background: none;
    border: none;
    color: var(--white);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* Contact badge for unread messages */
  .contact-badge {
    background: var(--accent-color);
    color: var(--white);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    position: absolute;
    top: 10px;
    right: 10px;
  }
  
  /* Delete account modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 3000;
  }
  
  .modal {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    max-width: 400px;
    width: 90%;
    box-shadow: var(--shadow-lg);
  }
  
  .modal-title {
    margin-top: 0;
    margin-bottom: 16px;
    color: var(--text-dark);
    font-size: 1.2em;
  }
  
  .modal-message {
    color: var(--text-dark);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  
  .modal-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
  }
  
  .modal-btn-cancel {
    background: var(--light-gray);
    color: var(--text-dark);
  }
  
  .modal-btn-delete {
    background: var(--danger);
    color: var(--white);
  }
  
  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--text-light);
  }
  
  /* Loading */
  .loading {
    text-align: center;
    padding: 20px;
    color: var(--text-light);
  }
  
  /* Scrollbar styling */
  #messages::-webkit-scrollbar {
    width: 6px;
  }
  
  #messages::-webkit-scrollbar-track {
    background: transparent;
  }
  
  #messages::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 3px;
  }
  
  #messages::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.3);
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-container">
    <div class="app-logo">😂</div>
    <h1 class="app-title">Whatsap_Abal-Abal</h1>
    <form class="login-form" id="login-form">
      <input type="text" id="username" placeholder="Nama Anda" required>
      
      <div class="password-container">
        <input type="password" id="password" placeholder="Password" required>
        <button type="button" class="toggle-password" id="toggle-password">👁️</button>
      </div>
      
      <div class="avatar-selection">
        <p>Pilih Avatar:</p>
        <div class="avatar-options" id="avatar-options">
          <!-- Avatar options will be populated by JavaScript -->
        </div>
      </div>
      
      <button type="submit" class="login-btn">Masuk / Daftar</button>
    </form>
  </div>
</div>

<!-- Main App -->
<div id="main-app">
  <header>
    <div class="user-info">
      <div class="user-avatar" id="current-user-avatar">👤</div>
      <span id="current-username">Pengguna</span>
    </div>
    <button class="logout-btn" id="logout-btn">Keluar</button>
  </header>

  <!-- Contacts Screen -->
  <div id="contacts-screen">
    <div class="contacts-header">
      <h2>Kontak</h2>
      <div>
        <button class="refresh-btn" id="refresh-contacts">🔄 Refresh</button>
        <button class="delete-account-btn" id="delete-account-btn">🗑️ Hapus Akun</button>
      </div>
    </div>
    <div class="contacts-list" id="contacts-list">
      <div class="loading">Memuat kontak...</div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div class="chat-header">
      <button class="back-btn" id="back-to-contacts">←</button>
      <div class="chat-contact-info">
        <div class="chat-contact-name" id="chat-with-name">Nama Kontak</div>
        <div class="chat-contact-status" id="chat-with-status">Online</div>
      </div>
      <div class="chat-actions">
        <button class="chat-action-btn" id="refresh-chat" title="Refresh Pesan">🔄</button>
        <button class="chat-action-btn" id="clear-chat" title="Hapus Percakapan">🗑️</button>
      </div>
    </div>
    
    <!-- PERBAIKAN UTAMA: Struktur chat container yang benar -->
    <div id="chat-container">
      <div id="messages">
        <div class="empty-state" id="empty-messages">
          <p>Belum ada pesan</p>
          <p>Mulai percakapan dengan mengirim pesan</p>
        </div>
      </div>
      
      <!-- PERBAIKAN UTAMA: Area input yang tetap di tempat -->
      <div id="input-area">
        <div class="input-buttons">
          <button class="input-btn" id="attach-media" title="Kirim Gambar/Video">📎</button>
        </div>
        <input type="text" id="message" placeholder="Ketik pesan...">
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-contacts">👥 Kontak</button>
    <button class="nav-btn" id="nav-chat">💬 Chat</button>
  </div>
</div>

<div id="notif">✅ Pesan terkirim</div>

<!-- Delete Account Modal -->
<div class="modal-overlay" id="delete-account-modal">
  <div class="modal">
    <h3 class="modal-title">Hapus Akun</h3>
    <p class="modal-message">Pilih kontak yang ingin dihapus:</p>
    <div id="delete-account-list"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="cancel-delete">Batal</button>
      <button class="modal-btn modal-btn-delete" id="confirm-delete" disabled>Hapus</button>
    </div>
  </div>
</div>

<!-- Hidden file input for media upload -->
<input type="file" id="media-input" accept="image/*,video/*" style="display: none;">

<script type="module">
  // Import Firebase modules
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { 
    getDatabase, 
    ref, 
    push, 
    onChildAdded, 
    remove, 
    onValue, 
    set, 
    get, 
    off 
  } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyD5xCQYLUGnbuS1v5wHn1-k5uovAd8lKe4",
    authDomain: "chat-riletime.firebaseapp.com",
    databaseURL: "https://chat-riletime-default-rtdb.firebaseio.com",
    projectId: "chat-riletime",
    storageBucket: "chat-riletime.firebasestorage.app",
    messagingSenderId: "467675334077",
    appId: "1:467675334077:web:7f0a33e0a96b2b84758e12"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // Database references
  const usersRef = ref(db, "users");
  const messagesRef = ref(db, "messages");
  
  // DOM Elements
  const loginScreen = document.getElementById("login-screen");
  const mainApp = document.getElementById("main-app");
  const loginForm = document.getElementById("login-form");
  const usernameInput = document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const togglePasswordBtn = document.getElementById("toggle-password");
  const avatarOptions = document.getElementById("avatar-options");
  const currentUserAvatar = document.getElementById("current-user-avatar");
  const currentUsername = document.getElementById("current-username");
  const logoutBtn = document.getElementById("logout-btn");
  
  const contactsScreen = document.getElementById("contacts-screen");
  const chatScreen = document.getElementById("chat-screen");
  const contactsList = document.getElementById("contacts-list");
  const refreshContactsBtn = document.getElementById("refresh-contacts");
  const deleteAccountBtn = document.getElementById("delete-account-btn");
  const backToContactsBtn = document.getElementById("back-to-contacts");
  const chatWithName = document.getElementById("chat-with-name");
  const chatWithStatus = document.getElementById("chat-with-status");
  const refreshChatBtn = document.getElementById("refresh-chat");
  const clearChatBtn = document.getElementById("clear-chat");
  
  const messages = document.getElementById("messages");
  const emptyMessages = document.getElementById("empty-messages");
  const messageInput = document.getElementById("message");
  const sendBtn = document.getElementById("sendBtn");
  
  // New elements for media and voice
  const attachMediaBtn = document.getElementById("attach-media");
  const mediaInput = document.getElementById("media-input");
  
  const navContacts = document.getElementById("nav-contacts");
  const navChat = document.getElementById("nav-chat");
  
  const notif = document.getElementById("notif");
  
  // Delete account modal elements
  const deleteAccountModal = document.getElementById("delete-account-modal");
  const deleteAccountList = document.getElementById("delete-account-list");
  const cancelDeleteBtn = document.getElementById("cancel-delete");
  const confirmDeleteBtn = document.getElementById("confirm-delete");
  
  // Global variables
  let currentUser = null;
  let selectedAvatar = "👤";
  let users = [];
  let currentChatUser = null;
  let messageListener = null;
  let newMessageListener = null;
  let unreadMessages = {};
  let selectedUserToDelete = null;
  
  // PERBAIKAN UTAMA: Menyimpan ID pesan yang sudah ditampilkan
  let displayedMessageIds = new Set();
  
  // Avatar options
  const avatarList = ["👤", "👨", "👩", "🧑", "👦", "👧", "👨‍💼", "👩‍💼", "👨‍🎓", "👩‍🎓"];
  
  // Initialize avatar options
  function initAvatarOptions() {
    avatarOptions.innerHTML = "";
    avatarList.forEach(avatar => {
      const avatarEl = document.createElement("div");
      avatarEl.className = "avatar-option";
      avatarEl.textContent = avatar;
      avatarEl.addEventListener("click", () => {
        document.querySelectorAll(".avatar-option").forEach(el => el.classList.remove("selected"));
        avatarEl.classList.add("selected");
        selectedAvatar = avatar;
      });
      avatarOptions.appendChild(avatarEl);
    });
    
    // Select first avatar by default
    if (avatarOptions.firstChild) {
      avatarOptions.firstChild.classList.add("selected");
    }
  }
  
  // Toggle password visibility
  togglePasswordBtn.addEventListener("click", () => {
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      togglePasswordBtn.textContent = "🙈";
    } else {
      passwordInput.type = "password";
      togglePasswordBtn.textContent = "👁️";
    }
  });
  
  // Show notification
  function showNotif(msg) {
    notif.innerText = msg;
    notif.style.display = "block";
    setTimeout(() => notif.style.display = "none", 2000);
  }
  
  // Switch screens
  function showScreen(screen) {
    contactsScreen.style.display = "none";
    chatScreen.style.display = "none";
    
    navContacts.classList.remove("active");
    navChat.classList.remove("active");
    
    switch(screen) {
      case "contacts":
        contactsScreen.style.display = "flex";
        navContacts.classList.add("active");
        break;
      case "chat":
        chatScreen.style.display = "flex";
        navChat.classList.add("active");
        break;
    }
  }
  
  // PERBAIKAN UTAMA: Fungsi untuk scroll ke bawah pesan
  function scrollToBottom() {
    // Gunakan setTimeout untuk memastikan DOM sudah terupdate
    setTimeout(() => {
      messages.scrollTop = messages.scrollHeight;
    }, 50);
  }
  
  // Login/Register
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!username || !password) {
      alert("Isi nama dan password!");
      return;
    }
    
    try {
      // Check if user exists
      const snapshot = await get(usersRef);
      let userExists = false;
      
      if (snapshot.exists()) {
        const usersData = snapshot.val();
        for (let id in usersData) {
          if (usersData[id].username === username) {
            // User exists, check password
            if (usersData[id].password === password) {
              currentUser = { id, ...usersData[id] };
              userExists = true;
              break;
            } else {
              alert("Password salah!");
              return;
            }
          }
        }
      }
      
      // If user doesn't exist, create new user
      if (!userExists) {
        const newUserRef = push(usersRef);
        currentUser = {
          id: newUserRef.key,
          username,
          password,
          avatar: selectedAvatar,
          createdAt: new Date().toISOString()
        };
        await set(newUserRef, currentUser);
        showNotif("✅ Akun berhasil dibuat!");
      }
      
      // Update UI and switch to main app
      currentUserAvatar.textContent = currentUser.avatar;
      currentUsername.textContent = currentUser.username;
      loginScreen.style.display = "none";
      mainApp.style.display = "flex";
      
      // Load contacts
      loadContacts();
      
      // Start listening for new messages
      startNewMessageListener();
    } catch (error) {
      console.error("Login error:", error);
      alert("Terjadi kesalahan saat login. Coba lagi.");
    }
  });
  
  // Logout
  logoutBtn.addEventListener("click", () => {
    currentUser = null;
    mainApp.style.display = "none";
    loginScreen.style.display = "flex";
    usernameInput.value = "";
    passwordInput.value = "";
    passwordInput.type = "password";
    togglePasswordBtn.textContent = "👁️";
    
    // Remove message listeners
    if (messageListener) {
      off(messagesRef, 'child_added', messageListener);
      messageListener = null;
    }
    
    if (newMessageListener) {
      off(messagesRef, 'child_added', newMessageListener);
      newMessageListener = null;
    }
    
    // PERBAIKAN UTAMA: Reset displayed messages
    displayedMessageIds.clear();
  });
  
  // Load contacts
  async function loadContacts() {
    try {
      contactsList.innerHTML = '<div class="loading">Memuat kontak...</div>';
      
      const snapshot = await get(usersRef);
      users = [];
      
      if (snapshot.exists()) {
        const usersData = snapshot.val();
        for (let id in usersData) {
          if (id !== currentUser.id) {
            users.push({ id, ...usersData[id] });
          }
        }
      }
      
      renderContacts();
    } catch (error) {
      console.error("Error loading contacts:", error);
      contactsList.innerHTML = '<div class="empty-state">Gagal memuat kontak</div>';
    }
  }
  
  // Render contacts
  function renderContacts() {
    contactsList.innerHTML = "";
    
    if (users.length === 0) {
      contactsList.innerHTML = "<div class='empty-state'><p>Belum ada pengguna lain</p><p>Bagikan aplikasi ini dengan teman Anda!</p></div>";
      return;
    }
    
    users.forEach(user => {
      const contactEl = document.createElement("div");
      contactEl.className = "contact-item";
      contactEl.addEventListener("click", () => openChat(user));
      
      // Check if there are unread messages from this user
      const unreadCount = unreadMessages[user.id] || 0;
      
      contactEl.innerHTML = `
        <div class="contact-avatar">${user.avatar}</div>
        <div class="contact-info">
          <div class="contact-name">${user.username}</div>
          <div class="contact-status">Klik untuk mengobrol</div>
        </div>
        ${unreadCount > 0 ? `<div class="contact-badge">${unreadCount}</div>` : ''}
      `;
      
      contactsList.appendChild(contactEl);
    });
  }
  
  // Refresh contacts
  refreshContactsBtn.addEventListener("click", loadContacts);
  
  // Open chat with a user
  function openChat(user) {
    currentChatUser = user;
    chatWithName.textContent = user.username;
    chatWithStatus.textContent = "Online";
    
    // Clear messages
    messages.innerHTML = '<div class="empty-state" id="empty-messages"><p>Memuat pesan...</p></div>';
    
    // Reset unread count for this user
    if (unreadMessages[user.id]) {
      unreadMessages[user.id] = 0;
      renderContacts();
    }
    
    // Load chat history
    loadChatHistory();
    
    // Switch to chat screen
    showScreen("chat");
    
    // Focus on message input
    setTimeout(() => {
      messageInput.focus();
      // PERBAIKAN UTAMA: Scroll ke bawah setelah chat dibuka
      setTimeout(scrollToBottom, 200);
    }, 100);
  }
  
  // Back to contacts
  backToContactsBtn.addEventListener("click", () => {
    showScreen("contacts");
    
    // Remove message listener when leaving chat
    if (messageListener) {
      off(messagesRef, 'child_added', messageListener);
      messageListener = null;
    }
    
    // PERBAIKAN UTAMA: Reset displayed messages ketika keluar dari chat
    displayedMessageIds.clear();
  });
  
  // Refresh chat
  refreshChatBtn.addEventListener("click", () => {
    if (currentChatUser) {
      // Clear current messages
      messages.innerHTML = '<div class="empty-state" id="empty-messages"><p>Memuat pesan...</p></div>';
      
      // PERBAIKAN UTAMA: Reset displayed messages
      displayedMessageIds.clear();
      
      // Reload chat history
      loadChatHistory();
      showNotif("✅ Percakapan diperbarui");
    }
  });
  
  // Clear chat
  clearChatBtn.addEventListener("click", async () => {
    if (currentChatUser && confirm("Apakah Anda yakin ingin menghapus semua pesan dalam percakapan ini?")) {
      try {
        // Get all messages
        const snapshot = await get(messagesRef);
        if (snapshot.exists()) {
          const messagesData = snapshot.val();
          
          // Delete messages between current user and chat user
          for (let id in messagesData) {
            const message = messagesData[id];
            if ((message.from === currentUser.id && message.to === currentChatUser.id) ||
                (message.from === currentChatUser.id && message.to === currentUser.id)) {
              await remove(ref(db, `messages/${id}`));
            }
          }
          
          // Clear local messages
          messages.innerHTML = '<div class="empty-state" id="empty-messages"><p>Belum ada pesan</p><p>Mulai percakapan dengan mengirim pesan</p></div>';
          
          // PERBAIKAN UTAMA: Reset displayed messages
          displayedMessageIds.clear();
          
          showNotif("✅ Percakapan dihapus");
        }
      } catch (error) {
        console.error("Error clearing chat:", error);
        showNotif("❌ Gagal menghapus percakapan");
      }
    }
  });
  
  // Navigation
  navContacts.addEventListener("click", () => showScreen("contacts"));
  navChat.addEventListener("click", () => {
    if (currentChatUser) {
      showScreen("chat");
    } else {
      alert("Pilih kontak terlebih dahulu!");
    }
  });
  
  // Send message
  sendBtn.addEventListener("click", sendMessage);
  messageInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
  
  async function sendMessage() {
    const messageText = messageInput.value.trim();
    if (!messageText || !currentChatUser) return;
    
    try {
      // Create message object
      const message = {
        from: currentUser.id,
        fromName: currentUser.username,
        to: currentChatUser.id,
        message: messageText,
        timestamp: new Date().toISOString(),
        timestampDisplay: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        type: "text"
      };
      
      // Push to Firebase
      await push(messagesRef, message);
      
      // Clear input
      messageInput.value = "";
      showNotif("✅ Pesan terkirim");
      
      // PERBAIKAN UTAMA: Scroll ke bawah setelah mengirim pesan
      setTimeout(scrollToBottom, 100);
    } catch (error) {
      console.error("Error sending message:", error);
      showNotif("❌ Gagal mengirim pesan");
    }
  }
  
  // Send media message
  async function sendMediaMessage(file, type) {
    if (!currentChatUser) return;
    
    try {
      // Convert file to base64 for storage
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Data = e.target.result;
        
        // Create message object
        const message = {
          from: currentUser.id,
          fromName: currentUser.username,
          to: currentChatUser.id,
          message: base64Data,
          timestamp: new Date().toISOString(),
          timestampDisplay: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          type: type,
          fileName: file.name,
          fileSize: file.size
        };
        
        // Push to Firebase
        await push(messagesRef, message);
        showNotif("✅ Media terkirim");
        
        // PERBAIKAN UTAMA: Scroll ke bawah setelah mengirim media
        setTimeout(scrollToBottom, 100);
      };
      reader.readAsDataURL(file);
    } catch (error) {
      console.error("Error sending media:", error);
      showNotif("❌ Gagal mengirim media");
    }
  }
  
  // Load chat history
  function loadChatHistory() {
    // Remove any existing listener
    if (messageListener) {
      off(messagesRef, 'child_added', messageListener);
    }
    
    // PERBAIKAN UTAMA: Reset displayed messages
    displayedMessageIds.clear();
    
    // Set up real-time listener for new messages
    messageListener = onChildAdded(messagesRef, (snapshot) => {
      const data = snapshot.val();
      const messageId = snapshot.key;
      
      // PERBAIKAN UTAMA: Cek apakah pesan sudah ditampilkan
      if (displayedMessageIds.has(messageId)) {
        return; // Skip jika pesan sudah ditampilkan
      }
      
      // Only show messages between current user and the selected chat user
      if ((data.from === currentUser.id && data.to === currentChatUser.id) ||
          (data.from === currentChatUser.id && data.to === currentUser.id)) {
        
        // PERBAIKAN UTAMA: Tandai pesan sebagai sudah ditampilkan
        displayedMessageIds.add(messageId);
        
        // Remove loading/empty state if it exists
        const emptyMsg = document.getElementById("empty-messages");
        if (emptyMsg) {
          emptyMsg.style.display = "none";
        }
        
        // Create message element
        const div = document.createElement("div");
        div.classList.add("msg");
        div.classList.add(data.from === currentUser.id ? "me" : "other");
        
        const time = data.timestampDisplay || new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Handle different message types
        let messageContent = "";
        
        if (data.type === "image") {
          messageContent = `
            <div class="msg-media">
              <img src="${data.message}" alt="Gambar" class="msg-image">
            </div>
          `;
        } else if (data.type === "video") {
          messageContent = `
            <div class="msg-media">
              <video controls class="msg-video">
                <source src="${data.message}" type="video/mp4">
                Browser Anda tidak mendukung pemutar video.
              </video>
            </div>
          `;
        } else if (data.type === "audio") {
          messageContent = `
            <div class="msg-audio">
              <audio controls class="audio-player">
                <source src="${data.message}" type="audio/wav">
                Browser Anda tidak mendukung pemutar audio.
              </audio>
              <div class="audio-duration">${formatTime(data.duration || 0)}</div>
            </div>
          `;
        } else {
          messageContent = `<div class="msg-content">${data.message}</div>`;
        }
        
        div.innerHTML = `
          ${data.from !== currentUser.id ? `<div class="msg-sender">${data.fromName}</div>` : ''}
          ${messageContent}
          <div class="msg-time">${time}</div>
        `;
        
        messages.appendChild(div);
        
        // PERBAIKAN UTAMA: Scroll ke bawah ketika pesan baru diterima
        setTimeout(scrollToBottom, 100);
      }
    });
    
    // Also load existing messages
    onValue(messagesRef, (snapshot) => {
      if (snapshot.exists()) {
        const messagesData = snapshot.val();
        let hasMessages = false;
        
        // Check if there are any messages for this conversation
        for (let id in messagesData) {
          const data = messagesData[id];
          if ((data.from === currentUser.id && data.to === currentChatUser.id) ||
              (data.from === currentChatUser.id && data.to === currentUser.id)) {
            hasMessages = true;
            break;
          }
        }
        
        // Show empty state if no messages
        if (!hasMessages) {
          messages.innerHTML = '<div class="empty-state" id="empty-messages"><p>Belum ada pesan</p><p>Mulai percakapan dengan mengirim pesan</p></div>';
        }
      }
    }, { onlyOnce: true }); // PERBAIKAN UTAMA: Hanya jalankan sekali
  }
  
  // Format time for audio duration
  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }
  
  // Start listening for new messages
  function startNewMessageListener() {
    // Remove any existing listener
    if (newMessageListener) {
      off(messagesRef, 'child_added', newMessageListener);
    }
    
    // Set up real-time listener for new messages
    newMessageListener = onChildAdded(messagesRef, (snapshot) => {
      const data = snapshot.val();
      const messageId = snapshot.key;
      
      // PERBAIKAN UTAMA: Cek apakah pesan sudah ditampilkan
      if (displayedMessageIds.has(messageId)) {
        return; // Skip jika pesan sudah ditampilkan
      }
      
      // Check if this is a message TO the current user
      if (data.to === currentUser.id) {
        // Check if we're currently chatting with this user
        const isChattingWithSender = currentChatUser && currentChatUser.id === data.from;
        
        // If we're not chatting with this user, show notification
        if (!isChattingWithSender) {
          // Increment unread count
          if (!unreadMessages[data.from]) {
            unreadMessages[data.from] = 0;
          }
          unreadMessages[data.from]++;
          
          // Update contacts list
          renderContacts();
          
          // Show notification
          showMessageNotification(data);
        }
        
        // PERBAIKAN UTAMA: Tandai pesan sebagai sudah ditampilkan
        displayedMessageIds.add(messageId);
      }
    });
  }
  
  // Show message notification
  function showMessageNotification(messageData) {
    // Find sender info
    const sender = users.find(user => user.id === messageData.from);
    if (!sender) return;
    
    // Create notification element
    const notification = document.createElement("div");
    notification.className = "message-notification";
    notification.innerHTML = `
      <div class="notification-avatar">${sender.avatar}</div>
      <div class="notification-content">
        <div class="notification-sender">${sender.username}</div>
        <div class="notification-message">${messageData.type === 'text' ? messageData.message : `Mengirim ${getMediaTypeText(messageData.type)}`}</div>
      </div>
      <button class="notification-close">✕</button>
    `;
    
    // Add to body
    document.body.appendChild(notification);
    
    // Show notification with animation
    setTimeout(() => {
      notification.classList.add("show");
    }, 100);
    
    // Close notification when clicked
    const closeBtn = notification.querySelector(".notification-close");
    closeBtn.addEventListener("click", () => {
      notification.classList.remove("show");
      setTimeout(() => {
        if (notification.parentNode) {
          notification.parentNode.removeChild(notification);
        }
      }, 300);
    });
    
    // Open chat when notification is clicked
    notification.addEventListener("click", (e) => {
      if (e.target !== closeBtn) {
        // Find the user and open chat
        const user = users.find(u => u.id === messageData.from);
        if (user) {
          openChat(user);
        }
        
        // Remove notification
        notification.classList.remove("show");
        setTimeout(() => {
          if (notification.parentNode) {
            notification.parentNode.removeChild(notification);
          }
        }, 300);
      }
    });
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
      if (notification.parentNode) {
        notification.classList.remove("show");
        setTimeout(() => {
          if (notification.parentNode) {
            notification.parentNode.removeChild(notification);
          }
        }, 300);
      }
    }, 5000);
  }
  
  // Get media type text for notification
  function getMediaTypeText(type) {
    switch(type) {
      case "image": return "gambar";
      case "video": return "video";
      case "audio": return "pesan suara";
      default: return "media";
    }
  }
  
  // Media attachment functionality
  attachMediaBtn.addEventListener("click", () => {
    mediaInput.click();
  });
  
  mediaInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    // Check file type
    if (file.type.startsWith("image/")) {
      sendMediaMessage(file, "image");
    } else if (file.type.startsWith("video/")) {
      sendMediaMessage(file, "video");
    } else {
      alert("Hanya gambar dan video yang didukung!");
    }
    
    // Reset input
    mediaInput.value = "";
  });
  
  // Delete account functionality
  deleteAccountBtn.addEventListener("click", () => {
    showDeleteAccountModal();
  });
  
  // Show delete account modal
  function showDeleteAccountModal() {
    deleteAccountList.innerHTML = "";
    selectedUserToDelete = null;
    confirmDeleteBtn.disabled = true;
    
    if (users.length === 0) {
      deleteAccountList.innerHTML = "<p style='color: var(--text-light); text-align: center;'>Tidak ada kontak yang dapat dihapus</p>";
    } else {
      users.forEach(user => {
        const userItem = document.createElement("div");
        userItem.className = "contact-item";
        userItem.style.cursor = "pointer";
        userItem.style.padding = "10px";
        userItem.style.borderRadius = "8px";
        userItem.style.marginBottom = "5px";
        userItem.style.border = "1px solid transparent";
        
        userItem.innerHTML = `
          <div class="contact-avatar">${user.avatar}</div>
          <div class="contact-info">
            <div class="contact-name">${user.username}</div>
          </div>
        `;
        
        userItem.addEventListener("click", () => {
          // Remove selection from all items
          document.querySelectorAll("#delete-account-list .contact-item").forEach(item => {
            item.style.background = "transparent";
            item.style.borderColor = "transparent";
          });
          
          // Select this item
          userItem.style.background = "var(--light-purple)";
          userItem.style.borderColor = "var(--primary-color)";
          
          selectedUserToDelete = user;
          confirmDeleteBtn.disabled = false;
        });
        
        deleteAccountList.appendChild(userItem);
      });
    }
    
    deleteAccountModal.style.display = "flex";
  }
  
  // Cancel delete
  cancelDeleteBtn.addEventListener("click", () => {
    deleteAccountModal.style.display = "none";
  });
  
  // Confirm delete
  confirmDeleteBtn.addEventListener("click", async () => {
    if (!selectedUserToDelete) return;
    
    try {
      // Delete user from Firebase
      await remove(ref(db, `users/${selectedUserToDelete.id}`));
      
      // Delete all messages from this user
      const messagesSnapshot = await get(messagesRef);
      if (messagesSnapshot.exists()) {
        const messagesData = messagesSnapshot.val();
        for (let id in messagesData) {
          const message = messagesData[id];
          if (message.from === selectedUserToDelete.id || message.to === selectedUserToDelete.id) {
            await remove(ref(db, `messages/${id}`));
          }
        }
      }
      
      // Remove from local state
      users = users.filter(user => user.id !== selectedUserToDelete.id);
      
      // Update UI
      renderContacts();
      
      // Close modal
      deleteAccountModal.style.display = "none";
      
      // Show notification
      showNotif(`✅ Akun ${selectedUserToDelete.username} berhasil dihapus`);
      
      // If we were chatting with this user, go back to contacts
      if (currentChatUser && currentChatUser.id === selectedUserToDelete.id) {
        showScreen("contacts");
        currentChatUser = null;
      }
    } catch (error) {
      console.error("Error deleting account:", error);
      showNotif("❌ Gagal menghapus akun");
    }
  });
  
  // Initialize the app
  initAvatarOptions();
  showScreen("contacts");
</script>
</body>
</html>
